<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Magic Trail Editor</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050814;
color:#fff;
}

#editor{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
padding:20px;
box-sizing:border-box;
}

.bar{
display:flex;
gap:10px;
margin-bottom:10px;
}

.preview{
flex:1;
background:radial-gradient(circle at 20% 20%, #1a3cff33, transparent),
radial-gradient(circle at 80% 60%, #ffae0033, transparent),
#0b1022;
border-radius:20px;
position:relative;
overflow:hidden;
}

.p{
position:absolute;
pointer-events:none;
animation:fade .8s ease-out forwards;
font-weight:900;
}

@keyframes fade{
0%{opacity:1;transform:scale(1);}
100%{opacity:0;transform:scale(.2) rotate(120deg);}
}

button{
padding:10px;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="editor">

<div class="bar">
<select id="shape">
<option value="✦">звёзды</option>
<option value="♡">сердца</option>
<option value="❀">цветы</option>
</select>

<input id="color" type="color" value="#ffae00">
<input id="size" type="range" min="8" max="40" value="16">
<input id="density" type="range" min="20" max="120" value="40">

<button id="copy">копировать код</button>
</div>

<div class="preview" id="preview"></div>

</div>

<script>
const preview=document.getElementById("preview");
const shape=document.getElementById("shape");
const color=document.getElementById("color");
const size=document.getElementById("size");
const density=document.getElementById("density");
const copy=document.getElementById("copy");

let last=0;

preview.addEventListener("mousemove",(e)=>{

if(Date.now()-last<density.value) return;
last=Date.now();

const r=preview.getBoundingClientRect();

const el=document.createElement("div");
el.className="p";
el.textContent=shape.value;

el.style.left=(e.clientX-r.left)+"px";
el.style.top=(e.clientY-r.top)+"px";
el.style.color=color.value;
el.style.fontSize=size.value+"px";

preview.appendChild(el);

setTimeout(()=>el.remove(),800);

});

function generate(){

return `
<div class="trail-zone"></div>

<script>
(function(){
const zone=document.currentScript.parentElement;
if(zone.dataset.trail) return;
zone.dataset.trail="1";

let last=0;

zone.addEventListener("mousemove",(e)=>{
if(Date.now()-last<${density.value}) return;
last=Date.now();

const r=zone.getBoundingClientRect();

const el=document.createElement("div");
el.textContent="${shape.value}";
el.style.position="absolute";
el.style.left=(e.clientX-r.left)+"px";
el.style.top=(e.clientY-r.top)+"px";
el.style.fontSize="${size.value}px";
el.style.color="${color.value}";
el.style.pointerEvents="none";

zone.appendChild(el);
setTimeout(()=>el.remove(),800);
});
})();
<\/script>
`;
}

copy.onclick=async()=>{
await navigator.clipboard.writeText(generate());
alert("скопировано");
};
</script>

</body>
</html>
