<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор шлейфа для мышки | Genially</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0b1120;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .editor-container {
            width: 90%; max-width: 1200px; height: 80vh;
            background-color: #0b1120;
            border: 1px solid #1e293b; border-radius: 15px;
            display: flex; flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            position: relative;
        }

        .controls {
            display: flex; align-items: center; justify-content: space-between;
            padding: 25px 40px; border-bottom: 1px solid #1e293b; gap: 20px;
        }

        .title {
            color: #ffae00; font-size: 26px; font-weight: 800;
            line-height: 1.1; text-transform: uppercase;
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; }

        .control-group label {
            font-size: 12px; color: #cbd5e1; font-weight: 600; text-transform: lowercase;
        }

        select, input[type="color"] {
            background-color: transparent; color: #ffffff;
            border: 2px solid #ffae00; padding: 8px 12px;
            border-radius: 6px; font-family: 'Montserrat', sans-serif;
            font-weight: 600; cursor: pointer; outline: none;
        }

        select {
            width: 140px; appearance: none; -webkit-appearance: none;
            background: url('data:image/svg+xml;utf8,<svg fill="%23ffae00" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>') no-repeat right 5px center;
        }

        select option { background-color: #0b1120; color: #ffffff; }

        input[type="color"] { height: 36px; width: 100px; padding: 0 4px; }
        input[type="range"] { accent-color: #ffae00; cursor: pointer; width: 120px; }

        .copy-btn {
            background-color: #ffae00; color: #000000; border: none;
            padding: 14px 24px; font-weight: 800; font-size: 14px;
            border-radius: 8px; cursor: pointer; transition: all 0.2s;
            text-transform: uppercase; font-family: 'Montserrat', sans-serif;
        }

        .copy-btn:hover { background-color: #ffcc00; transform: scale(1.05); }

        .preview-area {
            flex-grow: 1; position: relative; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden; cursor: crosshair;
            background: radial-gradient(circle at center, #10182b, #0b1120);
            border-radius: 0 0 15px 15px;
        }

        .preview-area h1 { color: #ffae00; font-size: 52px; font-weight: 800; margin-bottom: 15px; z-index: 10; }
        .preview-area p { color: #cbd5e1; font-size: 16px; z-index: 10; }
        .preview-label { position: absolute; top: 25px; left: 40px; color: #ffae00; font-weight: 800; font-size: 14px; }
        .preview-hint { position: absolute; top: 25px; right: 40px; color: #ffae00; font-weight: 800; font-size: 14px; }
        
        .toast {
            position: fixed; bottom: 20px; right: 20px;
            background-color: #10b981; color: white; padding: 15px 25px;
            border-radius: 8px; font-weight: 600; opacity: 0;
            transition: opacity 0.3s; pointer-events: none; z-index: 10000;
        }
    </style>
</head>
<body>

    <div class="editor-container">
        <div class="controls">
            <div class="title">Редактор<br>шлейфа</div>
            <div class="control-group">
                <label>форма</label>
                <select id="shape">
                    <option value="❤">Сердечки ❤</option>
                    <option value="★">Звёздочки ★</option>
                    <option value="✿">Цветочки ✿</option>
                    <option value="✨">Сияние ✨</option>
                    <option value="•">Точки •</option>
                </select>
            </div>
            <div class="control-group">
                <label>цвет</label>
                <input type="color" id="color" value="#ffae00">
            </div>
            <div class="control-group">
                <label>размер (<span id="sizeVal">24</span>px)</label>
                <input type="range" id="size" min="10" max="60" value="24">
            </div>
            <div class="control-group">
                <label>плотность</label>
                <input type="range" id="density" min="1" max="10" value="5">
            </div>
            <button class="copy-btn" id="copyBtn">Скопировать код</button>
        </div>

        <div class="preview-area" id="previewArea">
            <div class="preview-label">Предпросмотр</div>
            <div class="preview-hint">Наведи мышкой сюда</div>
            <h1>Проверь магию здесь</h1>
            <p>Двигай мышкой по большому полю. Такой же шлейф будет после вставки кода на слайд.</p>
        </div>
    </div>

    <div class="toast" id="toast">Код успешно скопирован!</div>

    <script>
        const shapeInput = document.getElementById('shape');
        const colorInput = document.getElementById('color');
        const sizeInput = document.getElementById('size');
        const densityInput = document.getElementById('density');
        const sizeVal = document.getElementById('sizeVal');
        const previewArea = document.getElementById('previewArea');
        const copyBtn = document.getElementById('copyBtn');
        const toast = document.getElementById('toast');

        sizeInput.addEventListener('input', (e) => sizeVal.innerText = e.target.value);

        let lastX = 0, lastY = 0;
        previewArea.addEventListener('mousemove', (e) => {
            const density = 12 - parseInt(densityInput.value); 
            if (Math.abs(e.clientX - lastX) < density && Math.abs(e.clientY - lastY) < density) return;
            lastX = e.clientX; lastY = e.clientY;

            const particle = document.createElement('div');
            particle.innerText = shapeInput.value;
            particle.style.position = 'fixed';
            particle.style.left = e.clientX + 'px';
            particle.style.top = e.clientY + 'px';
            particle.style.color = colorInput.value;
            particle.style.fontSize = sizeInput.value + 'px';
            particle.style.pointerEvents = 'none';
            particle.style.userSelect = 'none';
            particle.style.transition = 'transform 1s ease-out, opacity 1s ease-out';
            particle.style.transform = 'translate(-50%, -50%)';
            particle.style.zIndex = '9999';

            document.body.appendChild(particle);

            requestAnimationFrame(() => {
                particle.style.transform = `translate(-50%, -50%) translate(${Math.random() * 40 - 20}px, ${Math.random() * 40 - 20}px) scale(0.2)`;
                particle.style.opacity = '0';
            });

            setTimeout(() => { if (particle.parentNode) particle.parentNode.removeChild(particle); }, 1000);
        });

        copyBtn.addEventListener('click', () => {
            const shape = shapeInput.value;
            const color = colorInput.value;
            const size = sizeInput.value;
            const density = 12 - parseInt(densityInput.value);

            const geniallyCode = `<script>
                (function() {
                    try {
                        var win = window.parent || window;
                        var doc = win.document;
                        
                        if (win._magicTrailCleanup) win._magicTrailCleanup();
                        var oldBoxes = doc.querySelectorAll('.magic-trail-box');
                        oldBoxes.forEach(function(box) { if (box.parentNode) box.parentNode.removeChild(box); });

                        var container = doc.createElement('div');
                        container.className = 'magic-trail-box';
                        container.style.cssText = "position:fixed; top:0; left:0; width:100vw; height:100vh; pointer-events:none; z-index:2147483647 !important; overflow:hidden;";
                        
                        function ensureParent() {
                            var target = doc.fullscreenElement || doc.webkitFullscreenElement || doc.body;
                            if (container.parentNode !== target) {
                                target.appendChild(container);
                            }
                        }
                        ensureParent();
                        doc.addEventListener('fullscreenchange', ensureParent);
                        doc.addEventListener('webkitfullscreenchange', ensureParent);

                        var isSlideActive = true;
                        var myIframe = window.frameElement;
                        // Находим "родительский" слайд, к которому принадлежит этот код
                        var mySlide = myIframe ? myIframe.closest('.genially-view, .swiper-slide, section, .view-container, article') : null;

                        // Базовая проверка видимости фрейма
                        if (myIframe) {
                            var checkInterval = setInterval(function() {
                                try {
                                    var rect = myIframe.getBoundingClientRect();
                                    if (rect.right < 0 || rect.bottom < 0 || rect.left > win.innerWidth || rect.width === 0) {
                                        isSlideActive = false;
                                        container.style.display = 'none';
                                        return;
                                    }
                                    
                                    var node = myIframe;
                                    var hidden = false;
                                    while (node && node !== doc.body && node !== doc.documentElement) {
                                        if (node.getAttribute('aria-hidden') === 'true') { hidden = true; break; }
                                        var style = win.getComputedStyle(node);
                                        if (style.display === 'none' || style.visibility === 'hidden' || parseFloat(style.opacity) < 0.05 || style.pointerEvents === 'none') {
                                            hidden = true; break;
                                        }
                                        node = node.parentElement;
                                    }
                                    isSlideActive = !hidden;
                                    container.style.display = isSlideActive ? 'block' : 'none';
                                } catch(e) {}
                            }, 200);
                        }

                        var lastX = 0, lastY = 0;
                        var lastCheck = 0;
                        var isCovered = false;

                        var onMouseMove = function(e) {
                            if (!isSlideActive) return;

                            // БРОНЕБОЙНЫЙ РАДАР: Проверяем, какой слайд физически лежит под мышкой (раз в 100 мс)
                            var now = Date.now();
                            if (now - lastCheck > 100) {
                                lastCheck = now;
                                if (mySlide) {
                                    var topEl = doc.elementFromPoint(e.clientX, e.clientY);
                                    if (topEl) {
                                        var topSlide = topEl.closest('.genially-view, .swiper-slide, section, .view-container, article');
                                        // Если слайд под мышкой существует и это НЕ НАШ слайд -> мы перекрыты!
                                        isCovered = (topSlide && topSlide !== mySlide);
                                    } else {
                                        isCovered = false;
                                    }
                                }
                            }

                            // Если наш слайд перекрыт другим (пользователь перелистнул страницу) - глушим шлейф
                            if (isCovered) return;

                            if (Math.abs(e.clientX - lastX) < ${density} && Math.abs(e.clientY - lastY) < ${density}) return;
                            lastX = e.clientX; lastY = e.clientY;

                            var p = doc.createElement('div');
                            p.innerText = '${shape}';
                            p.style.cssText = "position:absolute; left:" + e.clientX + "px; top:" + e.clientY + "px; color:${color}; font-size:${size}px; pointer-events:none; user-select:none; transition: transform 1s ease-out, opacity 1s ease-out; transform: translate(-50%, -50%); z-index:2147483647 !important;";
                            container.appendChild(p);

                            p.getBoundingClientRect(); 
                            p.style.transform = "translate(-50%, -50%) translate(" + (Math.random()*40-20) + "px, " + (Math.random()*40-20) + "px) scale(0.2)";
                            p.style.opacity = "0";

                            setTimeout(function() { if(p.parentNode) p.parentNode.removeChild(p); }, 1000);
                        };

                        win.addEventListener('mousemove', onMouseMove, true);

                        win._magicTrailCleanup = function() {
                            win.removeEventListener('mousemove', onMouseMove, true);
                            doc.removeEventListener('fullscreenchange', ensureParent);
                            doc.removeEventListener('webkitfullscreenchange', ensureParent);
                            if (container.parentNode) container.parentNode.removeChild(container);
                            if (typeof checkInterval !== 'undefined') clearInterval(checkInterval);
                        };

                        window.addEventListener('unload', win._magicTrailCleanup);
                    } catch(e) { console.error("Ошибка шлейфа:", e); }
                })();
            <\/script>`;

            navigator.clipboard.writeText(geniallyCode).then(() => {
                toast.style.opacity = '1';
                setTimeout(() => toast.style.opacity = '0', 2500);
            });
        });
    </script>
</body>
</html>
